<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
    <label for="name">Name</label>
    <input id="name" type="text" placeholder="Enter Name" name="username">
    <br>
    <label for="password">Password</label>
    <input id="password" type="password" name="password">
    <br>
    <p>Gender</p>
    <label for="male">Male</label>
    <input type="radio" name="gen" id="male" value="male">
    <label for="female">Female</label>
    <input name="gen" type="radio" id="female" value="female" >
    <br>
    <p>Skill</p>
    <input id="java" name="skill" type="checkbox" value="java">
    <label for="java">Java</label>
    <input id="python" name="skill" type="checkbox" value="python">
    <label for="python">Python</label> 
    <br>
    <label for="country">Country</label>
    <select id="country" name="country">
        <option value="India">India</option>
        <option value="USA">USA</option>
    </select>
    <br>
    <textarea 
    name="feedback" 
    placeholder="Enter feedback">
        
    </textarea>
    <br>
    <input type="range" name="range">
    <br>
    <button type="submit">
        Submit
    </button>
</form>
</body>
</html>
