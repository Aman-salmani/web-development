<!--
------------ HTML Tags & Elements ------------

Definition (HTML Tag):
An HTML tag tells the browser how to structure or display content.

Syntax:
<tagname>Content</tagname>

Example:
<h1>Hello World</h1>

Definition (HTML Element):
An HTML element consists of an opening tag, content, and a closing tag.

Key Points:
1. Tags are written inside angle brackets (< >).
2. Most HTML tags have an opening and a closing tag.
3. An HTML element includes the opening tag, content, and closing tag.
4. Example: <h1>Hello World</h1> is an HTML element.
-->

<!--
------------ Common HTML Tags ------------

1. Heading Tag (<h1> to <h6>)
Definition:
Used to create headings and titles.

Syntax:
<h1>Heading</h1>

Key Points:
1. <h1> is the largest heading.
2. <h6> is the smallest heading.
3. Use headings to organize webpage content.

Example:
<h1>Welcome</h1>


2. Paragraph Tag (<p>)
Definition:
Used to display paragraphs or normal text.

Syntax:
<p>Paragraph Text</p>

Example:
<p>This is a paragraph.</p>


3. Image Tag (<img>)
Definition:
Used to display images on a webpage.

Syntax:
<img src="image.jpg" alt="Image Description">

Key Points:
1. src specifies the image path.
2. alt provides alternative text if the image cannot be displayed.
3. <img> is a self-closing (void) tag.
4. Keep the HTML file and image in the same folder (or use the correct relative path) to avoid broken images.

Example:
<img src="puppy.jpg" alt="A cute puppy">


4. Anchor Tag (<a>)
Definition:
Used to create hyperlinks.

Syntax:
<a href="URL">Link Text</a>

Key Points:
1. href specifies the destination URL.
2. Clicking the link opens another webpage or resource.

Example:
<a href="https://example.com">Visit Website</a>
-->

<!--
------------ HTML Tag Types ------------

1. Paired (Container) Tags
Definition:
Tags that have both an opening and a closing tag.

Syntax:
<tagname>Content</tagname>

Key Points:
1. Used to enclose content.
2. Also called Container Tags or Normal Tags.

Examples:
<h1>Hello World</h1>
<p>This is a paragraph.</p>


2. Empty (Void) Tags
Definition:
Tags that do not have a closing tag because they do not contain any content.

Syntax:
<tagname>

Key Points:
1. Do not require a closing tag.
2. Used to insert elements like images or line breaks.

Examples:
<img src="image.jpg" alt="Image">
<br>
<hr>
<input type="text">
-->
