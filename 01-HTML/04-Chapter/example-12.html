<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>
    <h1>Feedback Form</h1>
    <form action="#">
        <div>
            <label for="name">Name:</label>
            <input id="name" type="text" placeholder="Write your name" name="user-name">
            <label for="mail">Email:</label>
            <input id="mail" type="email" placeholder="Write your email" name="user-mail">
        </div>
        <div>
            <label for="message">Message:</label>
            <textarea
            id="message"
            rows="5"
            cols="30"
            name="feedback"
            placeholder="Enter your feedback"></textarea>
        </div>
        <div>
            <p>Rate us out of 5:</p>
            <label for="1">1</label>
            <input 
            id="1"
            type="radio"
            name="rate"
            value="1">
            <label for="2">2</label>
            <input 
            id="2"
            type="radio"
            name="rate"
            value="2">
                <label for="3">3</label>
            <input 
            id="3"
            type="radio"
            name="rate"
            value="3">
                <label for="4">4</label>
            <input 
            id="4"
            type="radio"
            name="rate"
            value="4">
            <label for="5">5</label>
            <input 
            id="5"
            type="radio"
            name="rate"
            value="5">
        </div>
        <button type="submit">Submit feedback</button>
    </form>
</body>
</html>
